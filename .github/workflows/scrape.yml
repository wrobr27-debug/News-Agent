name: Scheduled Scraper & Deploy

on:
  schedule:
    - cron: '0 */2 * * *'  # Runs every 2 hours
  workflow_dispatch:      # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write         # Required to commit changes back to the repo
  pages: write            # Required to deploy to GitHub Pages
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx beautifulsoup4 lxml playwright google-api-python-client openai pydantic python-dotenv feedparser fastapi uvicorn apscheduler yt-dlp

      - name: Install Playwright Browsers
        run: |
          playwright install chromium --with-deps

      - name: Install system dependencies (ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Run Scraper Pipeline
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TWITTER_HANDLE: ${{ secrets.TWITTER_HANDLE }}
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
        run: |
          # Create data directory if it doesn't exist
          mkdir -p data
          # Run CLI scraper with --social scraper enabled
          python src/main.py --social

      - name: Build Static Dashboard
        run: |
          python src/build_static.py
          echo "bsp.is-a.dev" > dist/CNAME

      - name: Commit and Push database changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news_agent.db || true
          git add data/instagram_state.json || true
          git add dist/index.html || true
          git add dist/CNAME || true
          git add dist/images/* || true
          git commit -m "Auto-update news feed [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Upload static files artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
